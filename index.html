<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MADTHEM - MADまとめサイト</title>
  <meta name="description" content="YouTubeのアニメMAD・AMVをジャンル別・アニメ別にまとめたNetflix風サイト。単体MAD・複合MAD・名言集を毎日更新、1000本以上を収録。" />
  <link rel="canonical" href="https://madlogapp.github.io/madthem/" />

  <!-- OGP / Twitter シェアカード -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MADTHEM" />
  <meta property="og:title" content="MADTHEM - アニメMAD/AMVまとめ" />
  <meta property="og:description" content="アニメMAD・AMVをジャンル別・アニメ別にまとめて毎日更新。単体MAD/複合MAD/名言集、1000本以上を収録。" />
  <meta property="og:url" content="https://madlogapp.github.io/madthem/" />
  <meta property="og:image" content="https://madlogapp.github.io/madthem/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ja_JP" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MADTHEM - アニメMAD/AMVまとめ" />
  <meta name="twitter:description" content="アニメMAD・AMVをジャンル別・アニメ別にまとめて毎日更新。1000本以上を収録。" />
  <meta name="twitter:image" content="https://madlogapp.github.io/madthem/og.png" />

  <!-- PWA / ホーム画面に追加 -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#141414" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MADTHEM" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/favicon-64.png" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===================== ヘッダー ===================== -->
  <header class="header" id="header">
    <div class="header__left">
      <a href="#" class="logo">MADTHEM</a>
      <nav class="nav" id="nav">
        <a href="#" class="nav__link is-active" data-filter="all">ホーム</a>
        <a href="#" class="nav__link" data-filter="single">単体MAD</a>
        <a href="#" class="nav__link" data-filter="composite">複合MAD</a>
        <a href="#" class="nav__link" data-filter="quote">名言集</a>
        <a href="#" class="nav__link" data-filter="hot">今注目</a>
        <a href="#" class="nav__link" data-filter="recommended">おすすめ</a>
      </nav>
    </div>
    <div class="header__right">
      <div class="search">
        <span class="search__icon">⌕</span>
        <input type="text" class="search__input" id="searchInput" placeholder="タイトル・職人・タグで検索" />
      </div>
      <button class="nav-toggle" id="navToggle" aria-haspopup="true" aria-expanded="false">
        <span id="navToggleLabel">ホーム</span> <span class="nav-toggle__caret">▾</span>
      </button>
      <div class="avatar">M</div>
    </div>
  </header>

  <!-- ===================== ヒーロー ===================== -->
  <section class="hero" id="hero">
    <div class="hero__backdrop" id="heroBackdrop"></div>
    <div class="hero__shade"></div>
    <div class="hero__content">
      <span class="hero__badge">今週の特選MAD</span>
      <h1 class="hero__title" id="heroTitle">—</h1>
      <p class="hero__meta" id="heroMeta">—</p>
      <p class="hero__desc" id="heroDesc">—</p>
      <div class="hero__actions">
        <button class="btn btn--play" id="heroPlay">▶ 再生</button>
        <button class="btn btn--info" id="heroInfo">ⓘ 詳細</button>
      </div>
    </div>
  </section>

  <!-- ===================== 行コンテナ ===================== -->
  <main class="rows" id="rows"></main>

  <!-- 五十音インデックス（単体MADビューで右端に固定表示） -->
  <nav class="az-index" id="azIndex" aria-label="アニメ索引" hidden></nav>

  <!-- ===================== 詳細モーダル ===================== -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__overlay" id="modalOverlay"></div>
    <div class="modal__card" role="dialog" aria-modal="true">
      <button class="modal__close" id="modalClose" aria-label="閉じる">✕</button>
      <div class="modal__player" id="modalPlayer"></div>
      <div class="modal__body">
        <h2 class="modal__title" id="modalTitle">—</h2>
        <div class="modal__meta" id="modalMeta"></div>
        <p class="modal__desc" id="modalDesc">—</p>
        <div class="modal__share">
          <button class="share-btn share-btn--x" id="shareX">𝕏 でシェア</button>
          <button class="share-btn share-btn--copy" id="shareCopy">🔗 リンクをコピー</button>
        </div>
        <div class="modal__tags" id="modalTags"></div>
        <div class="modal__related" id="modalRelated" hidden>
          <h3 class="modal__related-title">関連するMAD</h3>
          <div class="modal__related-track" id="modalRelatedTrack"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>MADTHEM — YouTubeのMAD/AMVをジャンルで楽しむ非公式まとめサイト（サンプル）</p>
    <p class="footer__note">※ 動画の権利は各制作者・権利者に帰属します。</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/data-auto.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
