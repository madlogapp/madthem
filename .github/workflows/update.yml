name: Daily MAD auto-update

# 1日3回（06:00 / 14:00 / 22:00 JST）に実行。手動実行も可。
on:
  schedule:
    - cron: "0 21 * * *"   # 06:00 JST
    - cron: "0 5 * * *"    # 14:00 JST
    - cron: "0 13 * * *"   # 22:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: pip install --upgrade yt-dlp

      - name: Run updater (YouTube → js/data-auto.js)
        run: python tools/update_mads.py

      - name: Commit & push if changed
        run: |
          git config user.name "madthem-bot"
          git config user.email "madthem-bot@users.noreply.github.com"
          git add js/data-auto.js js/data-auto.js.json tools/seen_ids.json tools/anime_cache.json
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: daily MAD auto-update ($(date -u +%Y-%m-%d))"
            git push
          fi

# --- セットアップ手順 ---------------------------------------------------------
# 1. このディレクトリ(madthem/)の中身を GitHub リポジトリの「ルート」として push。
#    （index.html がリポジトリ直下に来るようにする）
# 2. リポジトリ Settings → Pages → "Deploy from a branch" → main / (root) を選択。
#    → push のたびに自動デプロイされ、data-auto.js の更新も即反映されます。
# 3. Settings → Actions → General → Workflow permissions を
#    "Read and write permissions" にする（bot が push できるように）。
# 4. 初回は Actions タブから "Daily MAD auto-update" を手動実行して動作確認。
#
# ⚠️ GitHub の runner IP が YouTube に時々ブロックされる場合があります。
#    その際は self-hosted runner か Cloudflare Workers への移行で回避できます。
